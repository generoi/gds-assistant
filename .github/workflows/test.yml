name: Test

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - run: composer install --no-interaction

      - run: composer lint

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-interaction

      - name: Configure wp-env for CI
        run: cp .wp-env.override.json.ci .wp-env.override.json

      - name: Start wp-env
        run: npx @wordpress/env start

      - name: Activate plugins
        run: npx @wordpress/env run tests-cli wp plugin activate gds-assistant

      - name: Run PHPUnit
        run: npx @wordpress/env run tests-cli --env-cwd=wp-content/plugins/gds-assistant vendor/bin/phpunit

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-interaction

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Configure wp-env for CI
        run: cp .wp-env.override.json.ci .wp-env.override.json

      - name: Build assets
        run: npm run build

      - name: Start wp-env
        run: npx @wordpress/env start

      - name: Set test API key so widget loads
        run: npx @wordpress/env run tests-cli wp config set GDS_ASSISTANT_ANTHROPIC_KEY test-key --type=constant

      - name: Activate plugin
        run: npx @wordpress/env run tests-cli wp plugin activate gds-assistant

      - name: Run Playwright tests
        run: npx playwright test --config tests/e2e/playwright.config.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/artifacts/
          retention-days: 7
